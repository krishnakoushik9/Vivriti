server:
  port: 8090

spring:
  application:
    name: intellicredit-core
  datasource:
    url: jdbc:h2:mem:intellicreditdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  security:
    # Disable default security for MVP demo
    user:
      name: admin
      password: vivriti2025

# JWT Configuration
jwt:
  secret: VivritiIntelliCreditSecretKey2025AES256BitKeyForProduction
  expiration: 86400000

# Service URLs
services:
  python-worker:
    url: http://localhost:8001
  bff-node:
    url: http://localhost:3001

# CORS Configuration
cors:
  allowed-origins: http://localhost:3000,http://localhost:3001

# Actuator / Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Logging
logging:
  level:
    com.vivriti: DEBUG
    org.springframework.security: WARN
